<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet Connect - Penguin Fishing Club</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .wallet-container {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .wallet-container h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .wallet-button {
            background: linear-gradient(135deg, #8B4513 0%, #A0522D 50%, #8B4513 100%);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            margin: 10px;
        }
        .wallet-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .wallet-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .wallet-info {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
            font-family: monospace;
            word-break: break-all;
        }
        .success {
            color: #4CAF50;
        }
        .error {
            color: #f44336;
        }
    </style>
</head>
<body>
    <div class="wallet-container">
        <h1>🐧 Penguin Fishing Club</h1>
        <div id="wallet-connect-root"></div>
    </div>

    <!-- React and dependencies -->
    <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>

    <script>
        const { useState, useEffect } = React;

        function WalletConnectButton() {
            const [walletAddress, setWalletAddress] = useState(null);
            const [isConnecting, setIsConnecting] = useState(false);
            const [error, setError] = useState(null);

            const handleConnect = async () => {
                setIsConnecting(true);
                setError(null);
                
                try {
                    // Use the original Privy cross-app connect method
                    const requesterOrigin = window.location.origin;
                    const privyUrl = `https://privy.abs.xyz/cross-app/connect?` +
                        `provider_app_id=cm04asygd041fmry9zmcyn5o5&` +
                        `requester_origin=${encodeURIComponent(requesterOrigin)}&` +
                        `redirect_uri=${encodeURIComponent(requesterOrigin)}`;

                    // Open in same window for simplicity
                    window.location.href = privyUrl;
                } catch (error) {
                    console.error('Connection error:', error);
                    setError('Failed to connect wallet');
                    setIsConnecting(false);
                }
            };

            const handleDisconnect = () => {
                setWalletAddress(null);
                // Send disconnect message to parent
                if (window.opener) {
                    window.opener.postMessage({
                        type: 'WALLET_DISCONNECTED'
                    }, '*');
                }
            };

            // Check for wallet data in URL parameters (for redirect method)
            useEffect(() => {
                const urlParams = new URLSearchParams(window.location.search);
                const wallet = urlParams.get('wallet');
                const address = urlParams.get('address');
                const account = urlParams.get('account');
                
                if (wallet || address || account) {
                    const walletAddr = wallet || address || account;
                    setWalletAddress(walletAddr);
                    
                    // Send wallet address back to parent window
                    if (window.opener) {
                        window.opener.postMessage({
                            type: 'WALLET_CONNECTED',
                            address: walletAddr
                        }, '*');
                    }
                    
                    // Clean URL
                    window.history.replaceState({}, document.title, window.location.pathname);
                }
            }, []);

            return (
                <div>
                    {walletAddress ? (
                        <div>
                            <div className="wallet-info success">
                                <strong>Connected!</strong><br/>
                                {walletAddress}
                            </div>
                            <button className="wallet-button" onClick={handleDisconnect}>
                                Disconnect Wallet
                            </button>
                        </div>
                    ) : (
                        <div>
                            <button 
                                className="wallet-button" 
                                onClick={handleConnect}
                                disabled={isConnecting}
                            >
                                {isConnecting ? 'Connecting...' : 'Connect Abstract Global Wallet'}
                            </button>
                            {error && <div className="error">{error}</div>}
                        </div>
                    )}
                </div>
            );
        }

        function App() {
            return React.createElement(WalletConnectButton);
        }

        // Render the app
        const rootElement = document.getElementById('wallet-connect-root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(React.createElement(App));
    </script>
</body>
</html>
